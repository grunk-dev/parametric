name: "Build and test parametric"

on: 

  workflow_call:

    secrets:
      GH_TOKEN:
        description: 'A Github PAT'
        required: false
      CODECOV_TOKEN:
        description: 'Needed to upload coverage report to codecov'
        required: false

    inputs:

      os:
        description: "Operating system to run the job on"
        required: true
        type: string

      config:
        description: "Build configuration (Debug or Release)"
        required: true
        type: string

      build-docs:
        description: "Build the documentation of parametric (ON or OFF)"
        required: true
        type: string

      env:
        description: "The pixi environment to use."
        required: true 
        type: string


jobs:

  build:
    runs-on: ${{ inputs.os }}
    steps:
      # checkout, setup pixi, compilers and ccache/sccache
      - uses: actions/checkout@v6
      - name: Set up Visual Studio shell
        if: startsWith(inputs.os, 'windows')
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        if: startsWith(inputs.os, 'windows') == false
        with:
          key: compiler-cache-${{ inputs.os }}-${{ inputs.config }}-${{ inputs.pixienv }}
      - name: Setup sccache
        if: startsWith(inputs.os, 'windows')
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          environments: ${{ inputs.env }}

      # configure, build and install parametric
      - name: Configure parametric (Linux, MacOS)
        run: pixi run -e ${{ inputs.env }} configure ${{ inputs.config }} ${{ inputs.build-docs }}
        if: startsWith(inputs.os, 'windows') == false
        env:
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
      - name: Configure parametric (Windows)
        run: pixi run -e ${{ inputs.env }} configure ${{ inputs.config }} ${{ inputs.build-docs }}
        if: startsWith(inputs.os, 'windows')
        env:
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          SCCACHE_GHA_ENABLED: "true"
      - name: Build and install parametric
        run: pixi run -e ${{ inputs.env }} install -j4

      # save build artifacts

      - name: Create build archive
        run: tar -czf build.tar.gz build
      - name: Upload build archive
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ inputs.os }}-${{ inputs.config }}
          path: build.tar.gz
          retention-days: 1

      - name: Verify built docs
        if: inputs.build-docs == 'ON'
        run: |
          if [ ! -d build/docs/html ]; then
            echo "Documentation directory not found: build/docs/html"; ls -la build || true; exit 1
          fi

      - name: Upload documentation
        if: inputs.build-docs == 'ON'
        uses: actions/upload-artifact@v7
        with:
          name: html-documentation
          path: build/docs/html/*

  test:
    runs-on: ${{ inputs.os }}
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Download build directory
        uses: actions/download-artifact@v8
        with:
          name: build-${{ inputs.os }}-${{ inputs.config }}
      - name: Extract build archive
        run: tar -xzf build.tar.gz
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: Run unit tests
        run: pixi run test