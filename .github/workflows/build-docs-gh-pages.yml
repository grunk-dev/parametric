name: Build and publish docs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build documentation and publish
    runs-on: ubuntu-latest
    # Run on tag push (v*) or manual dispatch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          environments: docs

      - name: Configure project (pixi)
        run: |
          pixi run -e docs configure Release ON

      - name: Build project and docs (pixi)
        run: |
          pixi run -e docs build -j4

      - name: Verify built docs
        run: |
          if [ ! -d build/docs/html ]; then
            echo "Documentation directory not found: build/docs/html"; ls -la build || true; exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/html
          publish_branch: gh-pages
          keep_files: false
