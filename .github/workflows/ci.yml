name: CI

on:
  schedule:
    - cron: "20 3 * * 2"
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - 'main'
    tags:
      - v*
  workflow_dispatch:

jobs:

  build-test:
    strategy:
      matrix:
        include:
         - config: Release
           os: ubuntu-latest
           build-docs: ON
         - config: Debug
           os: ubuntu-latest
           build-docs: OFF
         - config: Release
           os: macos-13
           build-docs: OFF
         - config: Release
           os: windows-latest
           build-docs: OFF
    uses: ./.github/workflows/build-test.yml
    secrets: inherit
    with:
      os: ${{ matrix.os }}
      config: ${{ matrix.config }}
      build-docs: ${{ matrix.build-docs }}
      env: ${{ matrix.build-docs == 'ON' && 'docs' || 'default'}}