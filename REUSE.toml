version = 1

## Annotations in this file provide REUSE metadata for specific paths.
## pixi.lock is an auto-generated, tracked lockfile. To avoid reuse
## complaining about missing per-file headers while keeping the file in
## version control, provide its licensing info here.

[[annotations]]
path = "pixi.lock"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 <owner>"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "docs/images/**"
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 <owner>"
SPDX-License-Identifier = "Apache-2.0"
